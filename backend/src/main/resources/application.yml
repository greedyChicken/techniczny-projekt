spring:
  application:
    name: finance-app-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    driverClassName: org.postgresql.Driver
    username: finance
    password: finance
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:changelog-master.xml
    enabled: true
    drop-first: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-set-env-GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-set-env-GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: 8081

app:
  oauth2:
    frontend-callback-url: ${OAUTH2_FRONTEND_CALLBACK_URL:http://localhost:5173/auth/google/callback}
    frontend-login-url: ${OAUTH2_FRONTEND_LOGIN_URL:http://localhost:5173/login}
